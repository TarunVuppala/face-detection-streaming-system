services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: face_detection_streaming_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d face_detection_streaming_system",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/face_detection_streaming_system
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      # In production, these should point to the public domain/IP.
      # For Docker Compose with Nginx, we can use the relative paths since they're proxied.
      VITE_BACKEND_URL: ""
      VITE_BACKEND_WS_URL: ""
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
