services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: face_detection_streaming_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d face_detection_streaming_system",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app",
      ]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/face_detection_streaming_system
      FRONTEND_ORIGIN: http://localhost:5173
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests

  frontend:
    build:
      context: ./frontend
    command:
      [
        "sh",
        "-c",
        "npm install && npm run dev -- --host 0.0.0.0 --force",
      ]
    environment:
      VITE_BACKEND_URL: http://localhost:8000
      VITE_BACKEND_WS_URL: ws://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
